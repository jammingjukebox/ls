<html>
    <head>
        <style>
            img {
                position: absolute;
            }
            html, body {margin: 0; height: 100%; width: 100%; overflow: hidden}
            body {
                position: relative;
            }
            #jukebox {
                display: none;
                position: fixed;
                bottom: 90px;
                right: 100px;
                height: 50px;
                z-index: 99;
            }

            @font-face {
                font-family: 'Rocher';
                src: url("./media/fonts/RocherColorGX.woff");
            }

            #title-marquee {
                font-family: 'Rocher';
                margin: 0px;
                padding: 0px;
                z-index: 99;
                position: absolute;
                display: none;
                font-size: 5vw;
            }

            #shuffle {
                display: none;
                transition: all .5s ease-in-out;
                position: fixed;
                bottom: 10px;
                left: 10px;
                height: 125px;
                z-index: 99;
                cursor: pointer;
            }

            #shuffle:hover {
                position: fixed;
                transform: scale(1.15);
                z-index: 99;
            }
        </style>
    </head>
    <body>
        <marquee id="title-marquee" width="100%">HAPPY BIRTHDAY LOLA!!!</marquee>
        <span id="intro">
            <h1>wait a sec...</h1>
            <h2>if nothing loads in 30 seconds, try refreshing the page</h2>
        </span>
        <audio src="./media/audio/tune.wav" autostart="false" hidden="true" loop="true" id="tune" style="display:none;"></audio>
        <span id="jukebox">
            <img id="staticImage" src="./media/icons/jammingjukebox_static.gif" style="cursor: pointer;" onclick="toggleAnimation(); return false;">
            <img id="animatedImage" src="./media/icons/jammingjukebox.gif" style="display: none; cursor: pointer;" onclick="toggleAnimation(); return false;">
        </span>
        <img id="shuffle" src="./media/icons/shuffle.png">
        <span id="images-container"></span>

        <script>
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const landscape = vh < vw;

            const SIZE_TIERS = [
                { maxPx: 400,      folder: "Small"    },
                { maxPx: 800,      folder: "Medium"   },
                { maxPx: 1600,     folder: "Large"    },
                { maxPx: Infinity, folder: "Original" },
            ];

            // How much of an image's area can be covered before we skip loading it.
            // 0.95 = skip if 95%+ is covered. Lower = more aggressive skipping.
            const COVERAGE_SKIP_THRESHOLD = 1.00;

            function folderForDisplaySize(displayPx) {
                for (const tier of SIZE_TIERS) {
                    if (displayPx <= tier.maxPx) return tier.folder;
                }
                return "Original";
            }

            function isOnScreen(x, y, w, h) {
                return x + w > 0 && x < vw && y + h > 0 && y < vh;
            }

            // Returns the area of the intersection of two rectangles.
            // Each rect is { x, y, w, h }
            function intersectionArea(a, b) {
                const ox = Math.max(0, Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x));
                const oy = Math.max(0, Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y));
                return ox * oy;
            }

            // Given a list of placed rects above this one (i.e. higher z-order),
            // estimate the fraction of `rect` that is covered.
            //
            // We use a sampling grid instead of exact polygon math — accurate
            // enough and runs in microseconds even for 100+ images.
            function coveredFraction(rect, covers) {
                if (covers.length === 0) return 0;

                // Quick reject: if no cover even intersects, nothing to compute
                const anyOverlap = covers.some(c => intersectionArea(rect, c) > 0);
                if (!anyOverlap) return 0;

                // Sample an N×N grid of points across rect and count how many
                // are inside at least one covering rectangle.
                const N = 20; // 400 sample points — plenty of accuracy
                let covered = 0;
                for (let i = 0; i < N; i++) {
                    const px = rect.x + (rect.w * (i + 0.5)) / N;
                    for (let j = 0; j < N; j++) {
                        const py = rect.y + (rect.h * (j + 0.5)) / N;
                        for (const c of covers) {
                            if (px >= c.x && px < c.x + c.w &&
                                py >= c.y && py < c.y + c.h) {
                                covered++;
                                break; // only count once per sample point
                            }
                        }
                    }
                }
                return covered / (N * N);
            }

            function shuffle(array) {
                let i = array.length;
                while (i !== 0) {
                    const j = Math.floor(Math.random() * i--);
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            async function loadImageSizes() {
                const response = await fetch("./media/pics/imagesizes.json");
                if (!response.ok) throw new Error("Could not load imagesizes.json");
                return response.json();
            }

            function computeDisplaySize(naturalW, naturalH) {
                let displayW, displayH;
                if (landscape) {
                    const maxH = Math.floor(vh * 0.56);
                    const minH = Math.floor((vh / 4) * 0.8);
                    displayH = Math.floor(Math.random() * (maxH - minH) + minH);
                    displayW = naturalW && naturalH
                        ? Math.round(displayH * (naturalW / naturalH))
                        : displayH;
                } else {
                    const maxW = Math.floor(vw * 0.56);
                    const minW = Math.floor((vw / 4) * 0.8);
                    displayW = Math.floor(Math.random() * (maxW - minW) + minW);
                    displayH = naturalW && naturalH
                        ? Math.round(displayW * (naturalH / naturalW))
                        : displayW;
                }
                return { displayW, displayH };
            }

            function placeImages(imageData) {
                const container = document.getElementById("images-container");
                container.innerHTML = "";

                const order = imageData.map((_, i) => i);
                shuffle(order);

                // --- Pass 1: compute every image's position and size ---
                // We do this for ALL images first so we can check coverage
                // before deciding which ones to actually load.
                const layout = order.map(i => {
                    const { file, w, h } = imageData[i];
                    const { displayW, displayH } = computeDisplaySize(w, h);
                    const x = Math.floor(Math.random() * vw - displayW / 2);
                    const y = Math.floor(Math.random() * vh - displayH / 2);
                    return { file, naturalW: w, naturalH: h, x, y, w: displayW, h: displayH };
                });

                // --- Pass 2: decide which images to actually load ---
                // Images are rendered in array order (index 0 = bottom, last = top).
                // For each image, everything AFTER it in the array sits on top of it.
                let loaded = 0, skippedOffscreen = 0, skippedCovered = 0;
                const folderCounts = { Small: 0, Medium: 0, Large: 0, Original: 0 };

                for (let i = 0; i < layout.length; i++) {
                    const img = layout[i];

                    // Skip if fully off screen
                    if (!isOnScreen(img.x, img.y, img.w, img.h)) {
                        skippedOffscreen++;
                        continue;
                    }

                    // Clip rect to viewport for coverage check — no point checking
                    // the off-screen portion since it won't be visible anyway
                    const visRect = {
                        x: Math.max(img.x, 0),
                        y: Math.max(img.y, 0),
                        w: Math.min(img.x + img.w, vw) - Math.max(img.x, 0),
                        h: Math.min(img.y + img.h, vh) - Math.max(img.y, 0),
                    };

                    // All images that come AFTER this one sit on top of it
                    const above = layout.slice(i + 1);

                    const fraction = coveredFraction(visRect, above);
                    if (fraction >= COVERAGE_SKIP_THRESHOLD) {
                        skippedCovered++;
                        continue;
                    }

                    // It's visible enough — create the element
                    const longerAxis = Math.max(img.w, img.h);
                    const folder = folderForDisplaySize(longerAxis);
                    folderCounts[folder]++;

                    const el = document.createElement("img");
                    el.src = `./media/${folder}/${img.file}`;

                    if (landscape) {
                        el.height = img.h;
                    } else {
                        el.width = img.w;
                    }

                    el.style.top  = `${img.y}px`;
                    el.style.left = `${img.x}px`;

                    container.appendChild(el);
                    loaded++;
                }

                console.log(
                    `Loaded ${loaded} images | ` +
                    `skipped ${skippedOffscreen} off-screen, ${skippedCovered} covered\n` +
                    `  Small: ${folderCounts.Small}, Medium: ${folderCounts.Medium}, ` +
                    `Large: ${folderCounts.Large}, Original: ${folderCounts.Original}`
                );

                document.getElementById("intro").style.display   = "none";
                document.getElementById("jukebox").style.display = "inline";
                document.getElementById("shuffle").style.display = "inline";
            }

            async function start() {
                try {
                    const imageData = await loadImageSizes();
                    placeImages(imageData);
                } catch (e) {
                    console.error("Failed to load image sizes:", e);
                    document.querySelector("#intro h2").textContent =
                        "Error loading images. Make sure imagesizes.json exists in media/pics/.";
                }
            }

            start();
            document.getElementById("shuffle").addEventListener("click", start);

            function toggleAnimation() {
                const staticImage   = document.getElementById("staticImage");
                const animatedImage = document.getElementById("animatedImage");
                const audio         = document.getElementById("tune");
                const marquee       = document.getElementById("title-marquee");

                if (staticImage.style.display === "none") {
                    marquee.style.display       = "none";
                    audio.pause();
                    staticImage.style.display   = "block";
                    animatedImage.style.display = "none";
                } else {
                    marquee.style.display       = "inline";
                    audio.play();
                    staticImage.style.display   = "none";
                    animatedImage.style.display = "block";
                }
            }
        </script>
    </body>
</html>
